---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicea
  namespace: users-ns
  labels:
    app: servicea
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: servicea
  template:
    metadata:
      labels:
        app: servicea
        tier: api
    spec:
      serviceAccountName: servicea-sa
      containers:
        - name: servicea
          image: localhost:5555/servicea:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            # Sem URLs hardcoded - usa descoberta automática via KubernetesClient!
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /api/users
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/users
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: servicea
  namespace: users-ns
  labels:
    app: servicea
    api-type: users-api # For automatic discovery
    api-version: v1
  annotations:
    api.company.com/description: "Users API"
    api.company.com/owner: "users-team"
spec:
  type: ClusterIP
  selector:
    app: servicea
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
