---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicec
  namespace: orders-ns
  labels:
    app: servicec
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: servicec
  template:
    metadata:
      labels:
        app: servicec
        tier: api
    spec:
      serviceAccountName: servicec-sa
      containers:
        - name: servicec
          image: localhost:5555/servicec:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /api/orders
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/orders
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: servicec
  namespace: orders-ns
  labels:
    app: servicec
    api-type: orders-api # For automatic discovery
    api-version: v1
  annotations:
    api.company.com/description: "Orders API"
    api.company.com/owner: "orders-team"
spec:
  type: ClusterIP
  selector:
    app: servicec
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
