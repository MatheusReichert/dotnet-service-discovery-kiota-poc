---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: serviceb
  namespace: products-ns
  labels:
    app: serviceb
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: serviceb
  template:
    metadata:
      labels:
        app: serviceb
        tier: api
    spec:
      serviceAccountName: serviceb-sa
      containers:
        - name: serviceb
          image: localhost:5555/serviceb:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
            # Sem URLs hardcoded - usa descoberta automática via KubernetesClient!
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /api/products
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/products
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: serviceb
  namespace: products-ns
  labels:
    app: serviceb
    api-type: products-api # ← Label para descoberta automática
    api-version: v1
  annotations:
    api.company.com/description: "Products API"
    api.company.com/endpoints: "/api/products"
spec:
  type: ClusterIP
  selector:
    app: serviceb
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
