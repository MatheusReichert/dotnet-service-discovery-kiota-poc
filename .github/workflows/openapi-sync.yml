name: OpenAPI Sync & Kiota Regeneration

on:
  push:
    branches: [main, master]
    paths:
      - 'ServiceB/Program.cs'
      - 'ServiceB/**/*.cs'
      - 'ServiceC/Program.cs'
      - 'ServiceC/**/*.cs'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  generate-and-sync:
    name: Generate OpenAPI & Regenerate Clients
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # ServiceB: Build & Generate OpenAPI
      - name: Build ServiceB
        run: dotnet build ServiceB/ServiceB.csproj --configuration Release

      - name: Start ServiceB
        run: |
          dotnet run --project ServiceB --no-build --configuration Release --urls "http://localhost:5002" &
          echo $! > serviceb.pid
          for i in $(seq 1 30); do
            curl -s http://localhost:5002/openapi/v1.json > /dev/null 2>&1 && echo "ServiceB ready" && break
            echo "Waiting for ServiceB... ($i/30)"
            sleep 2
          done

      - name: Extract OpenAPI from ServiceB
        run: |
          curl -f http://localhost:5002/openapi/v1.json -o ServiceB/openapi.json
          cat ServiceB/openapi.json | jq '.' # Validate JSON

      - name: Stop ServiceB
        run: kill $(cat serviceb.pid) || true

      # ServiceC: Build & Generate OpenAPI
      - name: Build ServiceC
        run: dotnet build ServiceC/ServiceC.csproj --configuration Release

      - name: Start ServiceC
        run: |
          dotnet run --project ServiceC --no-build --configuration Release --urls "http://localhost:5003" &
          echo $! > servicec.pid
          for i in $(seq 1 30); do
            curl -s http://localhost:5003/openapi/v1.json > /dev/null 2>&1 && echo "ServiceC ready" && break
            echo "Waiting for ServiceC... ($i/30)"
            sleep 2
          done

      - name: Extract OpenAPI from ServiceC
        run: |
          curl -f http://localhost:5003/openapi/v1.json -o ServiceC/openapi.json
          cat ServiceC/openapi.json | jq '.'

      - name: Stop ServiceC
        run: kill $(cat servicec.pid) || true

      # Upload OpenAPI as artifacts
      - name: Upload OpenAPI Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openapi-specs-${{ github.sha }}
          path: |
            ServiceB/openapi.json
            ServiceC/openapi.json
          retention-days: 90

      # Install Kiota
      - name: Install Kiota
        run: dotnet tool install --global Microsoft.OpenApi.Kiota

      # Regenerate ServiceA client (consumes ServiceB)
      - name: Generate ServiceB Client for ServiceA
        run: |
          cd ServiceA
          kiota generate \
            -l CSharp \
            -d ../ServiceB/openapi.json \
            -o ./Generated/ServiceBClient \
            -n ServiceA.Generated.ServiceBClient \
            --clean-output

      # Regenerate ServiceB client (consumes ServiceC)
      - name: Generate ServiceC Client for ServiceB
        run: |
          cd ServiceB
          kiota generate \
            -l CSharp \
            -d ../ServiceC/openapi.json \
            -o ./Generated/ServiceCClient \
            -n ServiceB.Generated.ServiceCClient \
            --clean-output

      # Validate by building
      - name: Build All Projects to Validate
        run: dotnet build --configuration Release

      # Run integration tests
      - name: Run Integration Tests (ServiceA.Tests)
        run: dotnet test ServiceA.Tests/ServiceA.Tests.csproj --configuration Release --no-build --logger "console;verbosity=minimal"

      # Commit changes if on main branch
      - name: Commit regenerated clients
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ServiceA/Generated ServiceB/Generated ServiceB/openapi.json ServiceC/openapi.json
          git diff --staged --quiet || git commit -m "chore: regenerate Kiota clients from OpenAPI [skip ci]"
          git push
